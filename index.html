<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2BBCC8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="בריזה">
<meta name="description" content="בריזה — טכנאי מיני-בר ומערכות סודה. תיקון, התקנה ושדרוג ביום הפנייה. מוסמך משמרת השבת.">
<meta property="og:title" content="בריזה | מים שזורמים איתך">
<meta property="og:description" content="טכנאי מיני-בר ומערכות סודה מקצועיים. מוסמך משמרת השבת.">
<title>בריזה | מים שזורמים איתך</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #2BBCC8;
    --teal-dark: #1A9BAA;
    --teal-light: #7DD9E3;
    --teal-pale: #C8EFF3;
    --cream: #F4EEE4;
    --cream-dark: #E8DFD0;
    --text-dark: #1C3B3E;
    --text-mid: #3A6066;
    --text-light: #7EB5BB;
    --white: #FFFFFF;
    --wave-color: rgba(43,188,200,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Assistant', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
    direction: rtl;
  }

  /* ===== NAVBAR ===== */
  nav {
    position: fixed;
    top: 40px; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 5%;
    background: rgba(244,238,228,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(43,188,200,0.15);
  }

  .nav-logo { text-decoration: none; display: flex; align-items: center; }
  .logo-main { font-family: 'Heebo', sans-serif; font-weight: 900; font-size: 2rem; color: var(--teal); letter-spacing: -2px; }
  .logo-sub { font-size: 0.62rem; color: var(--text-mid); opacity: 0.8; }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 8%;
    background: linear-gradient(160deg, #F4EEE4 0%, #E2F7F9 60%, #C5EDF2 100%);
  }

  .hero-title { font-family: 'Heebo', sans-serif; font-size: clamp(3.5rem, 8vw, 6.5rem); font-weight: 900; line-height: 1; margin-bottom: 20px; }
  .hero-title .teal { color: var(--teal); }

  /* ===== REVIEWS SECTION (The Important Part) ===== */
  #reviews { background: white; padding: 80px 6%; overflow: hidden; }
  .reviews-header { text-align: center; margin-bottom: 50px; }
  
  .carousel-wrap {
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
  }

  .carousel-track-outer { overflow: hidden; border-radius: 24px; }
  
  /* זה ה-ID שהסקריפט מחפש */
  .carousel-track {
    display: flex;
    gap: 24px;
    transition: transform 0.6s ease;
  }

  .review-card {
    background: var(--cream);
    border-radius: 20px;
    padding: 32px 28px;
    border: 1px solid rgba(43,188,200,0.1);
    flex: 0 0 calc(33.333% - 16px);
    min-width: 300px;
  }

  /* Footer & Other sections styles omitted for brevity but preserved in your original code logic */
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <div class="logo-wordmark">
      <span class="logo-main">בריזה<span class="logo-dot"></span></span>
      <span class="logo-sub">מערכות מים וסודה מתקדמות</span>
    </div>
  </a>
</nav>

<section id="hero">
  <div class="hero-content">
    <div class="hero-badge"><span class="hero-badge-dot"></span> זמינות גבוהה באזור המרכז</div>
    <h1 class="hero-title">מים שזורמים <br><span class="teal">איתך.</span></h1>
    <p class="hero-sub">שירות מקצועי למיני-ברים, מערכות סודה תת-כיוריות ומסננים. מוסמך משמרת השבת.</p>
    <div class="hero-actions">
      <a href="https://wa.me/972502222222" class="btn-primary">הזמנת טכנאי עכשיו</a>
      <a href="#services" class="btn-secondary">השירותים שלנו</a>
    </div>
  </div>
</section>

<section id="reviews">
  <div class="reviews-header">
    <span class="section-tag">ביקורות לקוחות</span>
    <h2 class="section-title">מה הלקוחות <span class="teal">אומרים</span></h2>
  </div>

  <div class="carousel-wrap">
    <div class="carousel-track-outer">
      <div class="carousel-track" id="reviews-track">
        <p style="text-align: center; width: 100%; color: var(--text-light);">טוען ביקורות עדכניות מגוגל...</p>
      </div>
    </div>
  </div>
</section>

</body>
</html>
