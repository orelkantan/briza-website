name: 🔄 עדכון ביקורות גוגל אוטומטי

on:
  schedule:
    # 22:00 UTC corresponds to 00:00 (Midnight) Israel Time
    - cron: "0 22 * * *"
  workflow_dispatch:
 
jobs:
  update-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & update reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PLACE_ID: ${{ secrets.PLACE_ID }}
        run: python update_reviews.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .reviews_cache.json
          git diff --cached --quiet || git commit -m "🔄 עדכון ביקורות גוגל אוטומטי [$(date '+%Y-%m-%d')]"
          git push
